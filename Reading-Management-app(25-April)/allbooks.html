<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Browse and manage your entire book collection. Track reading progress, save notes, and organize your library.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <title>My Book Collection | Library Manager</title>
</head>

<body>
    <header>
        <div class="container-fluid">
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <div class="azaad-logo">
                        <a href="index.html">
                            <h1>Azaad </h1>
                        </a>
                    </div>
                    <nav>
                        <a href="/">Home</a> |
                        <a href="/allbooks.html">All Books</a> |
                        <a href="/readingrecord.html">Reading Record</a> |
                        <a href="/stats.html">Stats</a>
                    </nav>
                    <form class="d-flex" role="search">
                        <label for="search-input" class="visually-hidden">Search</label>
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-success" type="submit" aria-label="Search">Search</button>
                    </form>
                </div>
            </nav>
        </div>
    </header>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">All Books</li>
        </ol>
    </nav>

    <section class="bookShowCase">
        <section class="book-list-section">
            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1>All Books in Your Library</h1>
                        <p class="text-muted">Here's your complete book collection. See at a glance what you've read, what's in progress, and what's next. Click any book to view or edit notes and highlights.</p>
                    </div>
                    <a href="index.html" class="btn btn-outline-primary">Home</a>
                </div>
                <div class="row" id="book-list">
                    <!-- Books will be dynamically added here -->
                </div>
            </div>
        </section>
    </section>



    <script src="./js/allbooks.js"></script>
    <!-- <script src="./js/addnewbook.js"></script> -->
</body>

</html>
